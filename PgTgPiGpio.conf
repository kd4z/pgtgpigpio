# PgTgPiGpio configuration file
# Location: /etc/PgTgPiGpio/PgTgPiGpio.conf  (or ./PgTgPiGpio.conf for dev)
#
# Syntax: key = value   (whitespace around = is ignored, # starts a comment)

# TCP port for the JSON command interface
port = 5555

# GPIO chip device node (Raspberry Pi 4: /dev/gpiochip0)
gpio_chip = /dev/gpiochip0

# Relay output mappings: output<N> = GPIO BCM offset
# Physical header pins 31,33,35,37 -> BCM GPIO 6,13,19,26
output1 = 6
output2 = 13
output3 = 19
output4 = 26
